apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "tt-device-plugin.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tt-device-plugin.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "tt-device-plugin.selectorLabels" . | nindent 6 }}
  updateStrategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  template:
    metadata:
      labels:
        {{- include "tt-device-plugin.selectorLabels" . | nindent 8 }}
    spec:
      priorityClassName: system-node-critical
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: tt-device-plugin
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            {{- if .Values.cdi.enabled }}
            - name: TT_CDI_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.health.tempMaxC }}
            - name: TT_TEMP_MAX_C
              value: {{ .Values.health.tempMaxC | quote }}
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - name: TT_METRICS_PORT
              value: {{ .Values.metrics.port | quote }}
            {{- else }}
            - name: TT_METRICS_ENABLED
              value: "false"
            {{- end }}
          {{- if .Values.metrics.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: device-plugins
              mountPath: /var/lib/kubelet/device-plugins
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: dev-tenstorrent
              mountPath: /dev/tenstorrent
              readOnly: true
            - name: hugepages
              mountPath: /dev/hugepages-1G
              readOnly: true
            {{- if .Values.cdi.enabled }}
            - name: cdi
              mountPath: {{ .Values.cdi.specDir }}
            {{- end }}
      volumes:
        - name: device-plugins
          hostPath:
            path: /var/lib/kubelet/device-plugins
            type: Directory
        - name: sys
          hostPath:
            path: /sys
            type: Directory
        - name: dev-tenstorrent
          hostPath:
            path: /dev/tenstorrent
            type: Directory
        - name: hugepages
          hostPath:
            path: /dev/hugepages-1G
            type: DirectoryOrCreate
        {{- if .Values.cdi.enabled }}
        - name: cdi
          hostPath:
            path: {{ .Values.cdi.specDir }}
            type: DirectoryOrCreate
        {{- end }}
