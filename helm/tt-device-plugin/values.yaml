image:
  repository: ghcr.io/guhaneswaran/tt-k8s-device-plugin
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

# CDI (Container Device Interface) mode. Requires a CDI-aware runtime
# (containerd 1.7+/2.x or CRI-O). When enabled, the plugin writes CDI specs to
# specDir and Allocate returns qualified CDI device names instead of raw nodes.
cdi:
  enabled: false
  specDir: /var/run/cdi

# Device health tuning.
health:
  # Optional stricter temperature limit in whole degrees Celsius. Empty means
  # use the card's own sysfs temp1_max. A device at/above the limit is marked
  # Unhealthy so the scheduler stops placing pods on it.
  tempMaxC: ""

# Prometheus metrics. Serves /metrics with per-device health/temperature and
# per-class device/allocation counts.
metrics:
  enabled: true
  port: 9102

resources:
  limits:
    cpu: 100m
    memory: 64Mi
  requests:
    cpu: 50m
    memory: 32Mi

tolerations:
  - key: CriticalAddonsOnly
    operator: Exists

nodeSelector: {}

affinity: {}

updateStrategy:
  type: RollingUpdate
